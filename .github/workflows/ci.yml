name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  validate-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: pnpm}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm check:generated
      - run: pnpm test
      - run: pnpm build
