name: Daily candidate radar
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: {version: 11}
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: pnpm}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Discover and score review-pending candidates
        run: pnpm discover
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Create or update human-review issues
        run: pnpm radar:issues
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: radar-snapshot
          path: data/candidates/latest.json
          if-no-files-found: warn
