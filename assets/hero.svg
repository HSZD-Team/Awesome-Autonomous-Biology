  <path d="m929 36 28 5-13 26" fill="none" stroke="#a3e635" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#071426" stroke="url(#line)" stroke-width="4">
    <circle cx="190" cy="160" r="18"/><circle cx="274" cy="77" r="18"/><circle cx="384" cy="61" r="18"/>
    <circle cx="490" cy="105" r="18"/><circle cx="580" cy="180" r="18"/><circle cx="675" cy="246" r="18"/>
    <circle cx="820" cy="235" r="18"/><circle cx="912" cy="151" r="18"/><circle cx="944" cy="45" r="18"/>
  </g>
  <g fill="#e6f4ff" font-family="Inter,Segoe UI,sans-serif">
    <text x="600" y="145" text-anchor="middle" font-size="38" font-weight="800">AWESOME AUTONOMOUS BIOLOGY</text>
    <text x="600" y="184" text-anchor="middle" font-size="18" fill="#b8cedc">Observe · Reason · Design · Execute · Measure · Learn · Repeat</text>
