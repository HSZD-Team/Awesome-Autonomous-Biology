<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Awesome Autonomous Biology</title>
  <desc id="desc">A nine-node biological discovery loop connecting reasoning, experiments, measurement, and learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop stop-color="#071426"/>
      <stop offset=".5" stop-color="#10213b"/>
      <stop offset="1" stop-color="#15102f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop stop-color="#16d9d4"/>
      <stop offset=".55" stop-color="#9c6cff"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <g opacity=".16" stroke="#8abbd3"><path d="M0 64h1200M0 128h1200M0 192h1200M0 256h1200"/><path d="M120 0v320M240 0v320M360 0v320M480 0v320M600 0v320M720 0v320M840 0v320M960 0v320M1080 0v320"/></g>
