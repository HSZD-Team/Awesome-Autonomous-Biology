title: Awesome Autonomous Biology — Gold Seed v0.2
generated_on: '2026-07-19'
record_count: 100
scope:
  en: >-
    A curated, biology-specific seed set covering systems, scientific agents, models, protocols, laboratory infrastructure, datasets, standards, hardware, platforms, and
    communities that help complete one or more stages of a closed biological discovery loop. Inclusion does not imply that a resource is an autonomous scientist.
  zh: 面向生物学发现闭环的高置信种子集，覆盖系统、科学智能体、模型、协议、实验室基础设施、 数据集、标准、硬件、平台与社区。收录只表示该资源帮助完成闭环中的一个或多个环节， 不等于宣称它本身就是“自主科学家”。
curation_rules:
  - Biology-specific relevance is mandatory; generic AI or robotics resources are excluded unless they directly support a biological closed loop.
  - A verified record must cite at least one primary paper, official repository, dataset, standard, or official platform page.
  - Automated discoveries remain review_pending until a human checks identity, scope, links, and autonomy claims.
  - Scientific autonomy and operational autonomy are scored separately; automation alone is not scientific autonomy.
  - The nine loop stages are an information model; individual resources need not cover the full loop.
  - License labels are evidence, not legal advice; ambiguous repository statements are recorded explicitly.
